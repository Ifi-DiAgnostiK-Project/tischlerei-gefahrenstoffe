name: Build LiaScript Assets

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: liascript-assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-assets:
    runs-on: ubuntu-latest
    env:
      COURSE_FILE: README.md
      OUTPUT_DIR: liascript-assets
      RELEASE_TAG: latest
      BUNDLE_NAME: ${{ github.event.repository.name }}-liascript-assets.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install LiaScript Exporter
        run: npm install -g @liascript/exporter

      - name: Generate LiaScript exports
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"

          liaex -i "${COURSE_FILE}" --format scorm1.2 --output "${OUTPUT_DIR}/scorm12"
          liaex -i "${COURSE_FILE}" --format scorm2004 --output "${OUTPUT_DIR}/scorm2004"
          liaex -i "${COURSE_FILE}" --format ims --output "${OUTPUT_DIR}/ims"
          liaex -i "${COURSE_FILE}" --format xapi --xapi-zip --output "${OUTPUT_DIR}/xapi"
          liaex -i "${COURSE_FILE}" --format pdf --output "${OUTPUT_DIR}/course" --pdf-timeout 50000

          cd "${OUTPUT_DIR}"
          zip -9 "${BUNDLE_NAME}" scorm12.zip scorm2004.zip ims.zip xapi.zip course.pdf
          ls -lh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: liascript-assets
          path: ${{ env.OUTPUT_DIR }}/${{ env.BUNDLE_NAME }}
          if-no-files-found: error

      - name: Publish latest release asset
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "${RELEASE_TAG}" "${GITHUB_SHA}"
          git push --force origin "refs/tags/${RELEASE_TAG}"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${OUTPUT_DIR}/${BUNDLE_NAME}" --clobber
          else
            gh release create "${RELEASE_TAG}" "${OUTPUT_DIR}/${BUNDLE_NAME}" \
              --title "Latest LiaScript assets" \
              --notes "Automatisch gebaut aus README.md: PDF, SCORM 1.2, SCORM 2004, IMS und xAPI."
          fi

